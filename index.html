<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔄 Rāga & Krithi Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { 
      padding: 20px; 
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      color: #f9fafb;
    }
    .container {
      max-width: 1000px; margin: 0 auto;
      background: #111827; padding: 24px; border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    h1 { text-align: center; margin-bottom: 20px; color: #ec4899; }
    .form { 
      background: #1f2937; padding: 20px; border-radius: 12px; margin-bottom: 24px;
    }
    label { 
      display: block; margin: 8px 0 4px; color: #d1d5db; font-weight: 500; 
    }
    input, select, button { 
      width: 100%; padding: 10px; border-radius: 8px; border: none; 
      margin: 4px 0; 
    }
    input, select { 
      background: #374151; color: #f9fafb; 
    }
    button { 
      background: linear-gradient(135deg, #ec4899, #db2777);
      color: white; font-weight: 600; cursor: pointer; 
    }
    button:hover { 
      transform: translateY(-1px); 
    }
    .results { 
      margin-top: 20px; 
    }
    .raga-box { 
      background: #1e293b; padding: 16px; margin: 10px 0; 
      border-radius: 10px; border-left: 4px solid #ec4899;
    }
    .raga-box h3 { margin-bottom: 8px; color: #fcd34d; }
    .raga-box p { margin: 6px 0; font-size: 0.95rem; }
    .raga-box strong { color: #60a5fa; }
    .lyrics { 
      white-space: pre-line; font-family: monospace; font-size: 0.95rem;
      background: #0c111c; padding: 12px; border-radius: 6px; margin: 10px 0 0 0;
      border: 1px solid #27272a;
    }
    .notation { 
      font-family: monospace; font-size: 0.9rem; 
      background: #0f172a; padding: 10px; border-radius: 6px; margin: 8px 0 0 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔄 Rāga & Krithi Generator</h1>

    <div class="form">
      <h2 style="margin-bottom: 16px; color: #e5e7eb;">Rāga Parameters</h2>

      <label>Style</label>
      <select id="style">
        <option value="karnatic">Karnatic</option>
        <option value="hindustani">Hindustani</option>
      </select>

      <label>Swara Set (comma‑separated)</label>
      <input 
        type="text" 
        id="swara_set" 
        value="S,R2,G3,M1,P,D2,N3" 
        placeholder="S,R2,G3,M1,P,D2,N3"
      >

      <label>Śruti Lattice (e.g., 22‑śruti)</label>
      <input 
        type="text" 
        id="shruti_lattice" 
        value="..." 
        placeholder="C,C#,D,D#,E,F,F#,G,G#,A,A#,B"
      >

      <label>Target Languages (comma‑separated)</label>
      <input 
        type="text" 
        id="target_languages" 
        value="en,hi,ka,ta,tl,mr" 
        placeholder="en,hi,ka,ta,tl,mr"
      >

      <button type="button" onclick="generateRaga()">Generate Raga</button>
    </div>

    <div class="results" id="ragaResults"></div>
  </div>

  <script>
    function generateRaga() {
      const style  = document.getElementById('style').value;
      const swaraSet = document.getElementById('swara_set').value.trim();
      const shrutiLattice = document.getElementById('shruti_lattice').value.trim();
      const langsStr = document.getElementById('target_languages').value.trim();

      const targetLangs = langsStr
        .split(',')
        .map(s => s.trim())
        .filter(Boolean);

      // Clear previous results
      const out = document.getElementById('ragaResults');
      out.innerHTML = '<p>Loading ragas and krithis...</p>';

      // Call your Flask backend
      fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          style,
          swara_set: swaraSet,
          shruti_lattice: shrutiLattice,
          target_languages: targetLangs
        })
      })
      .then(res => {
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        }
        return res.json();
      })
      .then(data => {
        out.innerHTML = '';

        // Process each raga
        data.matched_ragas.forEach(raga => {
          const lang = 'en';  // You can make this configurable later

          const ragaBox = document.createElement('div');
          ragaBox.className = 'raga-box';

          ragaBox.innerHTML = `
            <h3>${raga[`name_${lang}`] || raga.name_en}</h3>
            <p><strong>Style:</strong> ${raga.style}</p>
            <p><strong>Aaroha:</strong> <span class="lyrics">${raga.aarooha}</span></p>
            <p><strong>Avaroha:</strong> <span class="lyrics">${raga.avaroha}</span></p>
            <p><strong>Notes:</strong> ${raga[`notes_${lang}`] || raga.notes_en}</p>
          `;

          out.appendChild(ragaBox);

          // Render krithis for this raga
          (data.krithis || []).forEach(krithi => {
            const kbox = document.createElement('div');
            kbox.className = 'raga-box';

            kbox.innerHTML = `
              <h3>${krithi[`title_${lang}`] || krithi.title_en}</h3>
              <p><strong>Lyrics (${lang}):</strong></p>
              <div class="lyrics">${krithi[`lyrics_${lang}`] || krithi.lyrics_en}</div>
              
              <p><strong>Swara Notation:</strong></p>
              <div class="notation">
                <pre>${krithi.swara_notation}</pre>
              </div>
              
              <p><strong>Western Notation:</strong></p>
              <div class="notation">
                <pre>${krithi.western_notation}</pre>
              </div>
            `;

            out.appendChild(kbox);
          });
        });
      })
      .catch(err => {
        console.error('Raga API error:', err);
        out.innerHTML = `
          <div class="raga-box" style="border-left-color: #ef4444;">
            <p style="color: #f87171;">
              <strong>Error:</strong> ${err.message}
            </p>
            <p>
              Make sure your Flask app is running at <code>http://localhost:5000</code> 
              and that <code>/api/generate</code> is reachable.
            </p>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
