<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔊 Carnatic Krithi Library - Voice Enabled</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+Telugu:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { 
      padding: 20px; 
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      color: #f9fafb;
    }
    .container {
      max-width: 1200px; margin: 0 auto;
      background: #111827; padding: 24px; border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    h1 { text-align: center; margin-bottom: 20px; color: #ec4899; }
    .tabs { 
      display: flex; gap: 8px; margin-bottom: 24px; 
      background: #1f2937; padding: 12px; border-radius: 12px;
    }
    .tab-btn { 
      flex: 1; padding: 12px; border: none; background: transparent; 
      color: #9ca3af; font-weight: 500; cursor: pointer; border-radius: 8px;
      transition: all 0.3s;
    }
    .tab-btn.active { 
      background: linear-gradient(135deg, #ec4899, #db2777); color: white; 
    }
    .form { 
      background: #1f2937; padding: 20px; border-radius: 12px; margin-bottom: 24px;
      display: none;
    }
    .form.active { display: block; }
    label { 
      display: block; margin: 8px 0 4px; color: #d1d5db; font-weight: 500; 
    }
    input, select, button { 
      width: 100%; padding: 12px; border-radius: 8px; border: none; 
      margin: 4px 0; font-family: inherit;
    }
    input, select { 
      background: #374151; color: #f9fafb; 
    }
    button { 
      background: linear-gradient(135deg, #ec4899, #db2777);
      color: white; font-weight: 600; cursor: pointer; 
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .results { margin-top: 20px; }
    .composer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
    .raga-box, .krithi-card { 
      background: #1e293b; padding: 16px; margin: 10px 0; 
      border-radius: 10px; border-left: 4px solid #ec4899; cursor: pointer;
      transition: all 0.3s;
    }
    .krithi-card:hover { border-left-color: #60a5fa; transform: translateX(4px); }
    .raga-box h3, .krithi-card h3 { margin-bottom: 8px; color: #fcd34d; }
    .raga-box p, .krithi-card p { margin: 6px 0; font-size: 0.95rem; }
    .raga-box strong, .krithi-card strong { color: #60a5fa; }
    .lyrics { 
      white-space: pre-line; font-family: 'Noto Sans Telugu', monospace; 
      font-size: 0.95rem; background: #0c111c; padding: 12px; 
      border-radius: 6px; margin: 10px 0; border: 1px solid #27272a;
    }
    .preview-lyrics { font-size: 0.9rem; color: #a1a1aa; border-color: #4b5563; }
    .notation { 
      font-family: monospace; font-size: 0.85rem; 
      background: #0f172a; padding: 10px; border-radius: 6px; margin: 8px 0;
    }
    .voice-btn { 
      background: linear-gradient(135deg, #10b981, #059669) !important; 
      padding: 8px 16px; border-radius: 20px; font-size: 0.9rem;
      margin: 4px; width: auto; display: inline-block;
    }
    .voice-btn:hover { transform: scale(1.05); }
    .voice-btn.speaking { 
      background: linear-gradient(135deg, #f59e0b, #d97706) !important;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    .modal { 
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.8); z-index: 1000; 
    }
    .modal-content { 
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #111827; padding: 24px; border-radius: 12px; max-width: 90%; 
      max-height: 80%; overflow-y: auto; 
    }
    .close { color: #ec4899; float: right; font-size: 28px; cursor: pointer; }
    .lang-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
    .lang-tab { padding: 6px 12px; background: #374151; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .lang-tab.active { background: #ec4899; color: white; }
    .voice-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔊 Carnatic Krithi Library - Voice Enabled 🎤</h1>
    <p style="text-align: center; color: #9ca3af; margin-bottom: 24px;">
      Shyama Shastri • Muthuswami Dikshitar • Annamayya • Tyagaraja<br>
      <small>🎵 FREE Voice Playback - No API Required</small>
    </p>

    <!-- Voice Permission Button -->
    <div style="text-align: center; margin-bottom: 20px;">
      <button onclick="initVoice()" id="voiceInitBtn" class="voice-btn">
        🎤 Enable Voice Playback
      </button>
    </div>

    <!-- Composer Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('shyama')">Shyama Shastri (75+)</button>
      <button class="tab-btn" onclick="switchTab('dikshitar')">Dikshitar (500+)</button>
      <button class="tab-btn" onclick="switchTab('annamayya')">Annamayya (300+)</button>
      <button class="tab-btn" onclick="switchTab('thyagaraja')">Tyagaraja (700+)</button>
    </div>

    <!-- Composer Menus (same as before) -->
    <div id="shyama" class="form active">
      <label>Search Krithis</label>
      <input type="text" id="shyama-search" placeholder="Search Shyama Shastri krithis..." oninput="filterKrithis('shyama')">
      <div class="composer-grid" id="shyama-grid"></div>
    </div>
    <div id="dikshitar" class="form">
      <label>Search Krithis</label>
      <input type="text" id="dikshitar-search" placeholder="Search Dikshitar krithis..." oninput="filterKrithis('dikshitar')">
      <div class="composer-grid" id="dikshitar-grid"></div>
    </div>
    <div id="annamayya" class="form">
      <label>Search Krithis</label>
      <input type="text" id="annamayya-search" placeholder="Search Annamayya sankeertanas..." oninput="filterKrithis('annamayya')">
      <div class="composer-grid" id="annamayya-grid"></div>
    </div>
    <div id="thyagaraja" class="form">
      <label>Search Krithis</label>
      <input type="text" id="thyagaraja-search" placeholder="Search Tyagaraja kritis..." oninput="filterKrithis('thyagaraja')">
      <div class="composer-grid" id="thyagaraja-grid"></div>
    </div>

    <div class="results" id="results"></div>
  </div>

  <!-- Preview Modal (same as before) -->
  <div id="previewModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <div id="modal-content"></div>
      <button onclick="showFullLyrics()" style="margin-top: 16px;">✅ Show Full Lyrics</button>
    </div>
  </div>

  <script>
    // Voice Synthesis - 100% FREE, Browser Native
    let synth = null;
    let currentVoiceUtterance = null;
    let voices = [];

    // Sample krithis with English transliteration for better voice
    const KRITHIS = {
      shyama: [
        {title: "అఖిలాండేశ్వరి", raga: "కర్ణాటక కాపి", key: "akhilandeshwari", 
         preview: "Pallavi: Akhilandeshwari durusuga brovumu...", 
         full: "Pallavi: Akhilandeshwari durusuga brovumu galanu\nAnupallavi: Karuna mayi rakshisu\nCharanam: Nannu rakshimpumu...", 
         english: "Akhilandeshwari, please come and protect me"},
        {title: "ఆదినముంచి", raga: "ఆనందభైరవి", key: "adinamunchi", 
         preview: "Pallavi: Adinamunchi brovu...", 
         full: "Pallavi: Adinamunchi brovu Raja Rajeshwari\n...", 
         english: "Please come from the beginning, Queen of Queens"},
        {title: "బ్రోవ బారమా", raga: "మంజి", key: "brovabarama", 
         preview: "Pallavi: Brova Barama Guru...", 
         full: "Pallavi: Brova Barama Guruvaraa...\n", 
         english: "Please come, Oh Guru"}
      ],
      dikshitar: [
        {title: "అభయాంబా జగదాంబా", raga: "కల్యాణి", key: "abhayamba", 
         preview: "Pallavi: Abhayamba Jagadamba...", 
         full: "Pallavi: Abhayamba Jagadamba manasara\n...", 
         english: "Abhayamba, Mother of Universe"},
        {title: "ఆనంద నటన ప్రకాశం", raga: "కేదారం", key: "ananda-natana", 
         preview: "Pallavi: Ananda Natana...", 
         full: "Pallavi: Ananda Natana Prakasha...\n", 
         english: "Lord of blissful cosmic dance"}
      ],
      annamayya: [
        {title: "అదివో అల్లదివో", raga: "మాళవశ్రీ", key: "adivo-alladivo", 
         preview: "Pallavi: Adivo Alladiyo...", 
         full: "Pallavi: Adivo Alladiyo Shri Hari Vasamu...\n", 
         english: "Where is He? Where does Lord Hari reside?"},
        {title: "బ్రహ్మ కడిగిన పాదము", raga: "ఖరహరప్రియ", key: "brahma-kadigina", 
         preview: "Pallavi: Brahma Kadigina...", 
         full: "Pallavi: Brahma Kadigina Padamu...\n", 
         english: "The feet that Brahma washed"}
      ],
      thyagaraja: [
        {title: "ఎందారో మహానుభావులు", raga: "శ్రీ", key: "endaro", 
         preview: "Pallavi: Endaro Mahanubhavulu...", 
         full: "Pallavi: Endaro Mahanubhavulu andariki vande...\n", 
         english: "Many great noble souls I salute"},
        {title: "బ్రోవ బారమా", raga: "బైరవి", key: "brova-barama-thy", 
         preview: "Pallavi: Brova Barama...", 
         full: "Pallavi: Brova Barama Raghurama...\n", 
         english: "Please come, Oh Rama"}
      ]
    };

    let currentKrithi = null;

    // === VOICE FUNCTIONS ===
    function initVoice() {
      synth = window.speechSynthesis;
      voices = synth.getVoices();
      
      if (voices.length === 0) {
        synth.onvoiceschanged = () => {
          voices = synth.getVoices();
          document.getElementById('voiceInitBtn').textContent = `🎤 Voice Ready (${voices.length} voices)`;
          document.getElementById('voiceInitBtn').style.background = 'linear-gradient(135deg, #10b981, #059669)';
        };
      } else {
        document.getElementById('voiceInitBtn').textContent = `🎤 Voice Ready (${voices.length} voices)`;
        document.getElementById('voiceInitBtn').style.background = 'linear-gradient(135deg, #10b981, #059669)';
      }
    }

    function speakText(text, rate = 0.8, pitch = 1.0) {
      if (!synth || synth.speaking) {
        if (synth.speaking) synth.cancel();
        return;
      }

      currentVoiceUtterance = new SpeechSynthesisUtterance(text);
      currentVoiceUtterance.rate = rate;
      currentVoiceUtterance.pitch = pitch;
      currentVoiceUtterance.volume = 1;
      
      // Select best available voice
      const englishVoices = voices.filter(voice => 
        voice.lang.startsWith('en') || voice.name.toLowerCase().includes('en')
      );
      if (englishVoices.length > 0) {
        currentVoiceUtterance.voice = englishVoices[0];
      }

      currentVoiceUtterance.onstart = () => {
        document.querySelectorAll('.voice-btn').forEach(btn => btn.classList.add('speaking'));
      };
      currentVoiceUtterance.onend = () => {
        document.querySelectorAll('.voice-btn').forEach(btn => btn.classList.remove('speaking'));
      };

      synth.speak(currentVoiceUtterance);
    }

    function stopSpeech() {
      if (synth) synth.cancel();
      document.querySelectorAll('.voice-btn').forEach(btn => btn.classList.remove('speaking'));
    }

    // Rest of the functions remain same...
    document.addEventListener('DOMContentLoaded', function() {
      initComposer('shyama');
      initVoice(); // Auto-init voice
    });

    function switchTab(composer) {
      document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(composer).classList.add('active');
      event.target.classList.add('active');
      initComposer(composer);
    }

    function initComposer(composer) {
      const grid = document.getElementById(composer + '-grid');
      const search = document.getElementById(composer + '-search');
      search.value = '';
      renderKrithis(composer, KRITHIS[composer]);
    }

    function filterKrithis(composer) {
      const search = document.getElementById(composer + '-search').value.toLowerCase();
      const krithis = KRITHIS[composer].filter(k => 
        k.title.toLowerCase().includes(search) || k.raga.toLowerCase().includes(search)
      );
      renderKrithis(composer, krithis);
    }

    function renderKrithis(composer, krithis) {
      const grid = document.getElementById(composer + '-grid');
      grid.innerHTML = '';
      
      krithis.forEach(krithi => {
        const card = document.createElement('div');
        card.className = 'krithi-card';
        card.innerHTML = `
          <h3>${krithi.title}</h3>
          <p><strong>రాగం:</strong> ${krithi.raga}</p>
          <p style="font-size: 0.85rem; color: #a1a1aa;">Click for Preview →</p>
        `;
        card.onclick = () => showPreview(krithi, composer);
        grid.appendChild(card);
      });
    }

    function showPreview(krithi, composer) {
      currentKrithi = {krithi, composer};
      const modal = document.getElementById('previewModal');
      const content = document.getElementById('modal-content');
      
      content.innerHTML = `
        <h3 style="color: #fcd34d;">📜 Preview - ${krithi.title}</h3>
        <p><strong>రాగం:</strong> ${krithi.raga}</p>
        <p><strong>Composer:</strong> ${composer.toUpperCase()}</p>
        <div class="lyrics preview-lyrics">
          ${krithi.preview}
        </div>
        <div class="voice-controls">
          <button class="voice-btn" onclick="speakText('${krithi.english || krithi.preview}')">🔊 Play Preview</button>
          <button class="voice-btn" onclick="stopSpeech()">⏹️ Stop</button>
        </div>
        <p style="color: #a1a1aa; font-size: 0.9rem;">
          ✅ Looks good? Click "Show Full Lyrics" below
        </p>
      `;
      
      modal.style.display = 'block';
    }

    function closeModal() {
      document.getElementById('previewModal').style.display = 'none';
      stopSpeech();
    }

    function showFullLyrics() {
      if (!currentKrithi) return;
      
      closeModal();
      const results = document.getElementById('results');
      const fullBox = document.createElement('div');
      fullBox.className = 'raga-box';
      fullBox.style.borderLeftColor = '#10b981';
      
      fullBox.innerHTML = `
        <h3 style="color: #10b981;">✅ ${currentKrithi.krithi.title} - పూర్తి లిరిక్స్</h3>
        <p><strong>రాగం:</strong> ${currentKrithi.krithi.raga}</p>
        <p><strong>Composer:</strong> ${currentKrithi.composer.toUpperCase()}</p>
        <div class="lyrics">${currentKrithi.krithi.full}</div>
        <div class="voice-controls">
          <button class="voice-btn" onclick="speakText('${currentKrithi.krithi.english || currentKrithi.krithi.full}')">🔊 Play Full Lyrics</button>
          <button class="voice-btn" onclick="speakText('${currentKrithi.krithi.full}', 0.7)">🎤 Slow Play</button>
          <button class="voice-btn" onclick="stopSpeech()">⏹️ Stop</button>
        </div>
        <div class="notation">
          <strong>స్వర స్త్రీ:</strong> S R2 G3 M1 P D2 N3 S'
        </div>
      `;
      
      results.insertBefore(fullBox, results.firstChild);
      currentKrithi = null;
    }

    window.onclick = function(event) {
      const modal = document.getElementById('previewModal');
      if (event.target == modal) closeModal();
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      if (e.key === ' ') { e.preventDefault(); speakText(currentKrithi?.krithi?.english || 'Select a kriti first'); }
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
